var D=[
{"id":1,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2\u2663","question":"Que montre l'intervention de 2\u2663 sur l'ouverture adverse de 1SA (convention Landy) ?","options":["A) Unicolore majeur sixi\u00e8me","B) Bicolore majeur au moins 5-4 (Landy)","C) Une mineure cinqui\u00e8me et une majeure quatri\u00e8me","D) Bicolore mineur 6-5"],"correct":"B","comment":"Convention Landy (accord de paire) : 2\u2663 sur 1SA adverse montre un bicolore majeur au moins 5-4. C'est la convention la plus r\u00e9pandue pour intervenir sur 1SA fort. \u26a0\ufe0f Convention optionnelle \u2014 accord de paire requis."},
{"id":2,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2\u2663 \u2013 2\u2666","question":"Apr\u00e8s l'intervention Landy \u00e0 2\u2663, que signifie la r\u00e9ponse 2\u2666 du partenaire ?","options":["A) Choisis ta majeure cinqui\u00e8me","B) Je veux jouer 2\u2666 naturels","C) J'ai un fit certain \u00e0 c\u0153ur","D) J'invite \u00e0 la manche"],"correct":"A","comment":"Sur 2\u2663 Landy, 2\u2666 est un relais artificiel demandant \u00e0 l'intervenant de pr\u00e9ciser sa majeure cinqui\u00e8me. Le partenaire n'a pas de pr\u00e9f\u00e9rence marqu\u00e9e et laisse l'intervenant choisir. \u26a0\ufe0f Convention optionnelle."},
{"id":3,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2\u2663 \u2013 2\u2665/2\u2660","question":"Apr\u00e8s un Landy \u00e0 2\u2663, quand le partenaire r\u00e9pond-il directement 2\u2665 ou 2\u2660 ?","options":["A) Avec un fit certain sans ambition particuli\u00e8re","B) Avec un singleton dans l'autre majeure","C) Avec une main tr\u00e8s forte de manche","D) Pour demander la mineure"],"correct":"A","comment":"Apr\u00e8s 2\u2663 Landy, le partenaire r\u00e9pond directement 2\u2665 ou 2\u2660 quand il a un fit certain et aucune ambition particuli\u00e8re (main faible). Il signale simplement le fit dans une majeure. \u26a0\ufe0f Convention optionnelle."},
{"id":4,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2\u2666","question":"Que promet l'intervention de 2\u2666 'Multi' sur l'ouverture adverse de 1SA ?","options":["A) Les deux majeures 5-5","B) Une majeure sixi\u00e8me (c\u0153ur ou pique)","C) Une majeure cinqui\u00e8me et une mineure quatri\u00e8me","D) Un bicolore mineur 6-5"],"correct":"B","comment":"Convention Multi 2\u2666 (accord de paire) : l'intervention 2\u2666 sur 1SA montre une main avec 6 c\u0153urs OU 6 piques. La couleur est inconnue jusqu'\u00e0 la rectification. \u26a0\ufe0f Convention optionnelle."},
{"id":5,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2\u2666 \u2013 rectification","question":"Apr\u00e8s l'intervention 2\u2666 Multi sur 1SA, quelle est la rectification standard du partenaire ?","options":["A) 2\u2660","B) 2\u2665","C) 2SA","D) Passe"],"correct":"B","comment":"Apr\u00e8s le Multi 2\u2666, le partenaire rectifie syst\u00e9matiquement \u00e0 2\u2665. L'intervenant passe s'il a 6 c\u0153urs ou corrige \u00e0 2\u2660 s'il a 6 piques. C'est le m\u00e9canisme de base du Multi. \u26a0\ufe0f Convention optionnelle."},
{"id":6,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2\u2666 \u2013 2SA","question":"Dans quel cas la r\u00e9ponse 2SA est-elle employ\u00e9e apr\u00e8s 2\u2666 Multi sur 1SA ?","options":["A) Avec 3-4 couvrantes (main forte)","B) Avec les deux majeures quatri\u00e8mes","C) Avec un singleton dans la mineure","D) Avec une invitation simple"],"correct":"A","comment":"Exception apr\u00e8s le Multi 2\u2666 : 2SA est r\u00e9serv\u00e9 aux mains tr\u00e8s fortes (3-4 couvrantes). Le partenaire montre ainsi qu'il peut envisager la manche quelle que soit la majeure de l'intervenant. \u26a0\ufe0f Convention optionnelle."},
{"id":7,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2\u2665/2\u2660","question":"Que montre une intervention naturelle \u00e0 2\u2665 ou 2\u2660 sur 1SA dans cette convention ?","options":["A) Une majeure cinqui\u00e8me et au moins une mineure quatri\u00e8me","B) Un bicolore majeur 5-4 minimum","C) Une main r\u00e9guli\u00e8re de 15-18 H","D) Une majeure sixi\u00e8me exactement"],"correct":"A","comment":"Dans cette convention (accord de paire), 2\u2665 ou 2\u2660 sur 1SA montre une majeure cinqui\u00e8me et une mineure d'au moins quatre cartes. C'est un bicolore connu/inconnu. \u26a0\ufe0f Convention optionnelle."},
{"id":8,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2\u2660 \u2013 2SA","question":"Apr\u00e8s une intervention \u00e0 2\u2660 (majeure cinqui\u00e8me + mineure), que signifie 2SA du partenaire ?","options":["A) Invitation \u00e0 la manche","B) Demande de la mineure","C) Choix de la majeure","D) Texas pour les tr\u00e8fles"],"correct":"B","comment":"Apr\u00e8s 2\u2660 (piques + mineure inconnue), 2SA est une demande artificielle : le partenaire veut conna\u00eetre la mineure associ\u00e9e. L'intervenant pr\u00e9cise alors sa mineure au palier de 3. \u26a0\ufe0f Convention optionnelle."},
{"id":9,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 X","question":"Que montre le contre sur l'ouverture adverse de 1SA dans cette convention ?","options":["A) Une mineure cinqui\u00e8me et une majeure quatri\u00e8me","B) Les deux majeures 5-5","C) Une majeure sixi\u00e8me","D) Un bicolore mineur 6-5"],"correct":"A","comment":"Dans cette convention (accord de paire), le contre sur 1SA est forcing et montre une mineure cinqui\u00e8me associ\u00e9e \u00e0 une majeure quatri\u00e8me. Le partenaire d\u00e9cide du contrat selon ses cartes. \u26a0\ufe0f Convention optionnelle."},
{"id":10,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 X \u2013 2\u2663","question":"Apr\u00e8s le contre (mineure cinqui\u00e8me + majeure quatri\u00e8me), que signifie 2\u2663 du partenaire ?","options":["A) \u00c0 jouer en mineure","B) \u00c0 jouer en majeure","C) Invitation \u00e0 la manche","D) Demande d'As"],"correct":"A","comment":"Sur ce contre artificiel, 2\u2663 signifie 'jouons en mineure' : le partenaire pr\u00e9f\u00e8re la mineure de l'intervenant \u00e0 sa majeure. L'intervenant rectifie dans sa mineure (2\u2666 ou passe si tr\u00e8fle). \u26a0\ufe0f Convention optionnelle."},
{"id":11,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 X \u2013 2\u2666","question":"Apr\u00e8s le contre (mineure cinqui\u00e8me + majeure quatri\u00e8me), que signifie 2\u2666 du partenaire ?","options":["A) \u00c0 jouer en mineure","B) \u00c0 jouer en majeure","C) Invitation \u00e0 la manche","D) Demande de singleton"],"correct":"B","comment":"Sur ce contre artificiel, 2\u2666 signifie 'jouons en majeure' : le partenaire pr\u00e9f\u00e8re la majeure de l'intervenant. L'intervenant rectifie dans sa majeure (2\u2665 ou 2\u2660). \u26a0\ufe0f Convention optionnelle."},
{"id":12,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2SA","question":"Que montre l'intervention directe de 2SA sur l'ouverture adverse de 1SA ?","options":["A) Une main r\u00e9guli\u00e8re de 15-18 H","B) Un bicolore mineur 6-5 (forcing)","C) Les deux majeures 5-5","D) Une majeure sixi\u00e8me"],"correct":"B","comment":"Dans cette convention (accord de paire), 2SA sur 1SA adverse = bicolore mineur 6-5, forcing. C'est une intervention distribu\u00e9e cherchant le meilleur contrat en mineure. \u26a0\ufe0f Convention optionnelle \u2014 ne pas confondre avec le SEF standard o\u00f9 2SA est naturel."},
{"id":13,"chapter":"Interventions sur 1SA","optional":true,"sequence":"(1SA) \u2013 2SA \u2013 ?","question":"Apr\u00e8s une intervention de 2SA (bicolore mineur 6-5), que doit faire le partenaire ?","options":["A) Choisir la mineure la plus longue de sa main","B) Nommer sa majeure quatri\u00e8me","C) R\u00e9pondre 2\u2666 Multi","D) Conclure syst\u00e9matiquement \u00e0 3SA"],"correct":"A","comment":"Apr\u00e8s 2SA (bicolore mineur 6-5), le partenaire choisit la mineure qu'il pr\u00e9f\u00e8re selon ses cartes. Il dit 3\u2663 ou 3\u2666 selon son fit. L'intervenant peut ensuite corriger si n\u00e9cessaire. \u26a0\ufe0f Convention optionnelle."},
{"id":14,"chapter":"D\u00e9fense contre 1SA \u2013 Landy","optional":true,"sequence":"1SA \u2013 (2\u2663) \u2013 ?","question":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, que signifie Passe ?","options":["A) Jusqu'\u00e0 7 HL, sans meilleure ench\u00e8re","B) 8-9 HL avec majeure quatri\u00e8me","C) Main r\u00e9guli\u00e8re de 10-15 H","D) Texas pour les tr\u00e8fles"],"correct":"A","comment":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, Passe est non-forcing jusqu'\u00e0 7 HL sans meilleure ench\u00e8re. Le r\u00e9pondant laisse l'ouvreur d\u00e9cider. \u26a0\ufe0f Convention optionnelle."},
{"id":15,"chapter":"D\u00e9fense contre 1SA \u2013 Landy","optional":true,"sequence":"1SA \u2013 (2\u2663) \u2013 X","question":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, que montre le contre ?","options":["A) Id\u00e9alement 7 ou 8 H et au moins 4 cartes dans une majeure","B) Une main r\u00e9guli\u00e8re de 10-15 H avec arr\u00eat","C) Unicolore tr\u00e8fle sixi\u00e8me","D) Unicolore carreau sixi\u00e8me"],"correct":"A","comment":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, le contre montre id\u00e9alement 7-8 H et au moins 4 cartes dans une majeure. C'est un contre comp\u00e9titif cherchant la meilleure couleur. \u26a0\ufe0f Convention optionnelle."},
{"id":16,"chapter":"D\u00e9fense contre 1SA \u2013 Landy","optional":true,"sequence":"1SA \u2013 (2\u2663) \u2013 2\u2666","question":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, que signifie 2\u2666 ?","options":["A) Naturel, comp\u00e9titif et plut\u00f4t faible","B) Relais positif avec les deux majeures","C) Texas tr\u00e8fle","D) Main r\u00e9guli\u00e8re de 10-15 H"],"correct":"A","comment":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, 2\u2666 est naturel, comp\u00e9titif et plut\u00f4t faible. On montre simplement des carreaux sans force particuli\u00e8re, pour occuper le terrain. \u26a0\ufe0f Convention optionnelle."},
{"id":17,"chapter":"D\u00e9fense contre 1SA \u2013 Landy","optional":true,"sequence":"1SA \u2013 (2\u2663) \u2013 2SA","question":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, que montre 2SA ?","options":["A) Texas tr\u00e8fle avec 6 tr\u00e8fles ou bicolore mineur, main irr\u00e9guli\u00e8re","B) Invitation \u00e0 3SA, main r\u00e9guli\u00e8re","C) Arr\u00eat dans les deux majeures","D) Demande d'As"],"correct":"A","comment":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, 2SA est un Texas tr\u00e8fle : 6 tr\u00e8fles ou bicolore mineur sur main irr\u00e9guli\u00e8re. Convention de la d\u00e9fense sp\u00e9cifique. \u26a0\ufe0f Convention optionnelle."},
{"id":18,"chapter":"D\u00e9fense contre 1SA \u2013 Landy","optional":true,"sequence":"1SA \u2013 (2\u2663) \u2013 3\u2663","question":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, que montre 3\u2663 ?","options":["A) Texas carreau avec 6 carreaux et singleton, quasi forcing manche","B) Soutien faible \u00e0 tr\u00e8fle","C) Main r\u00e9guli\u00e8re de manche","D) Relais positif dans les majeures"],"correct":"A","comment":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, 3\u2663 est un Texas carreau : 6 carreaux et un singleton, main quasi forcing manche. L'ouvreur rectifie \u00e0 3\u2666. \u26a0\ufe0f Convention optionnelle."},
{"id":19,"chapter":"D\u00e9fense contre 1SA \u2013 Landy","optional":true,"sequence":"1SA \u2013 (2\u2663) \u2013 3SA","question":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, que montre 3SA ?","options":["A) Toutes les mains r\u00e9guli\u00e8res de 10 \u00e0 15 H","B) Un jeu positif avec les deux majeures","C) Un Texas tr\u00e8fle fort","D) Une proposition de p\u00e9nalit\u00e9"],"correct":"A","comment":"Apr\u00e8s 1SA \u2013 (2\u2663) Landy, 3SA couvre toutes les mains r\u00e9guli\u00e8res de 10 \u00e0 15 H, m\u00eame sans arr\u00eat dans les majeures. L'ouvreur de 1SA est le mieux plac\u00e9 pour g\u00e9rer. \u26a0\ufe0f Convention optionnelle."},
{"id":20,"chapter":"D\u00e9fense contre 1SA \u2013 Multi","optional":true,"sequence":"1SA \u2013 (2\u2666) \u2013 Passe \u2013 2SA","question":"Apr\u00e8s 1SA \u2013 (2\u2666 Multi) \u2013 Passe \u2013 2SA, que montre 2SA ?","options":["A) Relais positif, en g\u00e9n\u00e9ral les deux majeures avec espoir de manche","B) Main faible avec longue \u00e0 carreau","C) Soutien dans les deux majeures, sans ambition","D) Naturel \u00e0 sans-atout, faible"],"correct":"A","comment":"Apr\u00e8s 1SA \u2013 (2\u2666 Multi) \u2013 Passe, le 2SA du r\u00e9pondant est un relais positif : g\u00e9n\u00e9ralement les deux majeures avec espoir de manche. Il permet d'explorer la meilleure destination. \u26a0\ufe0f Convention optionnelle."}
];

function chapSt(){var s={};for(var i=0;i<D.length;i++){var ch=D[i].chapter;if(!s[ch])s[ch]={t:0,a:0,c:0};s[ch].t++;if(ans[i]!==undefined){s[ch].a++;if(ans[i]===D[i].correct)s[ch].c++;}}return s;}

function getChs(){var seen={},chs=[];for(var i=0;i<D.length;i++){if(!seen[D[i].chapter]){seen[D[i].chapter]=true;chs.push(D[i].chapter);}}return chs;}
function renderCN(){var cs=chapSt(),chs=getChs(),h="";for(var i=0;i<chs.length;i++){var ch=chs[i],st=cs[ch]||{t:0,a:0,c:0};var done=st.a===st.t&&st.t>0;var active=D[cur].chapter===ch;h+="<button class=\"cb"+(active?" active":"")+(done?" done":"")+"\" data-i=\""+i+"\">"+sh(ch)+" ("+st.c+"/"+st.t+")</button>";}ge("cn").innerHTML=h;var bs=ge("cn").querySelectorAll("button");for(var i=0;i<bs.length;i++){bs[i].addEventListener("click",(function(ch){return function(){for(var j=0;j<D.length;j++){if(D[j].chapter===ch){cur=j;renderQ();break;}}};})(chs[+bs[i].getAttribute("data-i")]));}}
function renderJN(){var s=Math.max(0,cur-7),e=Math.min(D.length,s+15),h="";if(s>0)h+="<button class=\"jb\" data-idx=\"0\">1&#8230;</button>";for(var i=s;i<e;i++){var a=ans[i];var cl=i===cur?"cur":(a!==undefined?(a===D[i].correct?"ok":"ko"):"");h+="<button class=\"jb "+cl+"\" data-idx=\""+i+"\">"+(i+1)+"</button>";}if(e<D.length)h+="<button class=\"jb\" data-idx=\""+(D.length-1)+"\">&#8230;"+D.length+"</button>";ge("jn").innerHTML=h;var bs=ge("jn").querySelectorAll("button");for(var i=0;i<bs.length;i++){bs[i].addEventListener("click",(function(idx){return function(){cur=idx;renderQ();};})(+bs[i].getAttribute("data-idx")));}}
function renderSB(){var st=getSt();ge("s1").textContent=(cur+1)+"/"+D.length;ge("s2").textContent=st.c;ge("s3").textContent=st.a>0?Math.round(st.c/st.a*100)+"%":"&#8212;";ge("s4").textContent=D.length-st.a;ge("prog").style.width=Math.round(cur/D.length*100)+"%";}
function renderQ(){var q=D[cur],a=ans[cur];renderSB();renderCN();renderJN();var handH="";for(var i=0;i<SUITS.length;i++){var su=SUITS[i];var rc=su.r?" red":"";var cards=(q.hand&&q.hand[su.k])?q.hand[su.k]:"&#8212;";handH+="<div class=\"sb2\"><span class=\"sm"+rc+"\">"+su.s+"</span><span class=\"sc"+rc+"\">"+cards+"</span></div>";}handH+="<div class=\"hl\">Convention d'accord de paire</div>";var seqH=q.sequence?"<div class=\"seq\">"+q.sequence+"</div>":"";var badgeH=q.optional?"<div class=\"badge\">\u26a0\ufe0f Accord de paire requis</div>":"";var optsH="";var opts=q.options||[];for(var i=0;i<opts.length;i++){var l=L[i];var cls="opt";if(a!==undefined){if(l===q.correct)cls+=" ok2";else if(l===a)cls+=" ko2";}var dis=a!==undefined?" disabled":"";var ck=(a!==undefined&&l===q.correct)?"<span class=\"ck\">&#10003;</span>":"";var txt=opts[i].replace(/^[A-D]\)\s*/,"");optsH+="<button class=\""+cls+"\""+dis+" data-l=\""+l+"\"><span class=\"lt\">"+l+"</span><span>"+txt+"</span>"+ck+"</button>";}var cmtCls="cmt"+(a!==undefined?(" show"+(a===q.correct?"":" err")):"");var cmtH="";if(a!==undefined){var ok=a===q.correct;var ic=ok?"&#10022; Correct !":"&#10007; Incorrect.";var co=ok?"#166534":"#991b1b";cmtH="<strong style=\"color:"+co+"\">"+ic+"</strong> "+q.comment;}var pd=cur===0?" disabled":"";var nxt=cur<D.length-1?"<button class=\"nb pr\" id=\"bn\">Suivant &#8594;</button>":"<button class=\"nb pr\" id=\"br\">&#127942; R&#233;sultats</button>";ge("qa").innerHTML="<div class=\"qc\"><div class=\"qm\"><span class=\"qi\">Q"+(q.id||cur+1)+"</span><span class=\"qch\">"+q.chapter+"</span></div><div class=\"qb\"><div class=\"hand\">"+handH+"</div>"+badgeH+seqH+"<div class=\"qt\">"+q.question+"</div><div class=\"opts\">"+optsH+"</div><div class=\""+cmtCls+"\">"+cmtH+"</div></div></div><div class=\"nr\"><button class=\"nb\" id=\"bp\""+pd+">&#8592; Pr&#233;c&#233;dent</button><span class=\"nc\">"+Object.keys(ans).length+"/"+D.length+" r&#233;pondu</span>"+nxt+"</div>";var obs=ge("qa").querySelectorAll(".opt");for(var i=0;i<obs.length;i++){obs[i].addEventListener("click",(function(letter){return function(){if(ans[cur]!==undefined)return;ans[cur]=letter;renderQ();};})(obs[i].getAttribute("data-l")));}var bp=ge("bp");if(bp)bp.addEventListener("click",function(){if(cur>0){cur--;renderQ();}});var bn=ge("bn");if(bn)bn.addEventListener("click",function(){if(cur<D.length-1){cur++;renderQ();}});var br=ge("br");if(br)br.addEventListener("click",showRes);}
function showRes(){var st=getSt();var pct=Math.round(st.c/D.length*100);var men=pct>=85?"Excellent &#8212; Sp\u00e9cialiste conventions sur 1SA !":pct>=70?"Tr\u00e8s bien jou\u00e9 !":pct>=55?"Bien &#8212; quelques r\u00e9visions s'imposent.":pct>=40?"Moyen &#8212; r\u00e9visez ces conventions.":"&#192; retravailler &#8212; relisez les conventions sur 1SA.";var cs=chapSt(),chs=getChs(),cards="";for(var i=0;i<chs.length;i++){var ch=chs[i],s=cs[ch]||{t:0,a:0,c:0};var p=s.a>0?Math.round(s.c/s.a*100):0;var cl=p>=80?"gr":p>=60?"go":"gp";cards+="<div class=\"rc "+cl+"\"><div class=\"rn\">"+sh(ch)+"</div><div class=\"rv\">"+s.c+"/"+s.a+" &#183; "+p+"%</div></div>";}ge("prog").style.width="100%";ge("qa").style.display="none";ge("jn").style.display="none";var r=ge("rs");r.innerHTML="<div class=\"rs\">"+pct+"%</div><div class=\"rm\">"+st.c+" / "+D.length+" correctes &#8212; "+men+"</div><div style=\"font-size:11px;color:#64748b;margin-bottom:1rem\">\u26a0\ufe0f Toutes ces conventions n\u00e9cessitent un accord de paire explicite</div><div class=\"rg\">"+cards+"</div><div class=\"ra\"><button class=\"nb pr\" id=\"brst\">&#8635; Recommencer</button><button class=\"nb\" id=\"bwr\">Revoir erreurs</button><button class=\"nb\" id=\"bal\">Tout revoir</button></div>";r.classList.add("show");ge("brst").addEventListener("click",function(){ans={};cur=0;ge("qa").style.display="";ge("jn").style.display="";ge("rs").classList.remove("show");renderQ();});ge("bwr").addEventListener("click",function(){var f=-1;for(var i=0;i<D.length;i++){if(ans[i]!==undefined&&ans[i]!==D[i].correct){f=i;break;}}cur=f>=0?f:0;ge("qa").style.display="";ge("jn").style.display="";ge("rs").classList.remove("show");renderQ();});ge("bal").addEventListener("click",function(){cur=0;ge("qa").style.display="";ge("jn").style.display="";ge("rs").classList.remove("show");renderQ();});}
renderQ();
